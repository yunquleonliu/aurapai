
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auro-PAI Chat</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>Auro-PAI Assistant</h1>
        </div>
        <div class="chat-messages" id="chat-messages">
            <!-- Messages will be appended here -->
        </div>
        <div class="chat-input-container">
            <form id="chat-form" class="chat-input">
                <div class="input-row">
                    <input type="file" id="image-input" accept="image/*" style="display: none;">
                    <button type="button" id="attach-button" title="Attach Image">📎</button>
                    <input type="text" id="message-input" placeholder="Type your message..." autocomplete="off">
                    <button type="submit" id="send-button">&#x27A4;</button>
                    <button type="button" id="stop-button" style="display: none;">&#x23F9;</button>
                </div>
                <div id="image-preview" style="display: none;">
                    <img id="preview-img" src="" alt="Preview">
                    <button type="button" id="remove-image">✕</button>
                </div>
            </form>
        </div>
    </div>
    <script src="/static/js/app.js"></script>
</body>
</html>
