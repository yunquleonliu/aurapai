<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura-PAI Chat</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>Chat Sessions</h2>
            </div>
            <ul id="session-list"></ul>
            <button id="clear-history-button">Clear History</button>
            <p class="disclaimer">All history is stored locally and can be deleted at any time.</p>
        </div>
        <div class="chat-main">
            <div class="chat-header">
                <button id="menu-icon" class="menu-icon" aria-label="Toggle menu">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
                <h1>Aura-PAI</h1>
            </div>
            <div id="chat-container">
                <div id="chat-messages"></div>
            </div>
            <div id="input-area">
                <div id="image-preview" style="display: none;">
                    <img id="preview-img" src="" alt="Image preview">
                    <button id="remove-image" aria-label="Remove image">×</button>
                </div>
                <form id="chat-form">
                    <button type="button" id="attach-button" aria-label="Attach image">📎</button>
                    <input type="file" id="image-input" accept="image/*" style="display: none;">
                    <textarea id="message-input" placeholder="Type your message..." rows="1"></textarea>
                    <button type="submit" id="send-button" aria-label="Send">&#10148;</button>
                    <button type="button" id="stop-button" style="display: none;" aria-label="Stop">&#9632;</button>
                    <button type="button" id="generate-button" aria-label="Generate">&#10024;</button>
                </form>
            </div>
        </div>
    </div>
    <script src="/static/js/app.js"></script>
</body>
</html>
